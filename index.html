<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/favIcon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Criar Site em Feira de Santana | Desenvolvimento Profissional de Sites
    </title>
    <meta
      name="description"
      content="Criação de sites profissionais em Feira de Santana. Landing pages, sites institucionais e sistemas web para empresas que querem mais clientes."
    />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "name": "Antonio Gabriel",
        "areaServed": [
          { "@type": "City", "name": "Feira de Santana" },
          { "@type": "State", "name": "Bahia" }
        ],
        "makesOffer": {
          "@type": "Offer",
          "itemOffered": { "@type": "Service", "name": "Criação de Sites" }
        }
      }
    </script>
    <script>
      (function () {
        try {
          var storedTheme = localStorage.getItem("theme-preference");
          var prefersLight = window.matchMedia(
            "(prefers-color-scheme: light)",
          ).matches;
          if (storedTheme === "light" || (!storedTheme && prefersLight)) {
            document.documentElement.classList.add("light");
          } else {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
